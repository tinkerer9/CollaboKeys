<!DOCTYPE html>
<html>
<head>
    <title>CollaboKeys Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="item header">
            <div class="header-text">
                <h1>CollaboKeys Admin</h1>
                <p id="normalInfo"><i>Use CollaboKeys admin controls from another device.</i></p>
                <p id="noAdminInfo" class="bad"><i><b>The CollaboKeys admin page is currently disabled. Please go to src/config.json to enable.</b></i></p>
            </div>
            <div class="header-logo">
                <img src="logo.png" alt="CollaboKeys Logo">
            </div>
        </div>

        <div class="item controls">
            <h2 class="contentHeaders">Controls:</h2>
            <div class="authentication">
                <p>Please enter the admin password:</p>
                <input type="password" id="input" placeholder="Password">
                <button id="enter">Continue</button>
            </div>
            <div class="controlButtons">
                <input type="text" id="customCommandText" placeholder="Custom Command">
                <button id="customCommand">enter</button><br><br>

                <button id="stopCommand">stop program</button><br><br>
                
                <button id="pauseCommand">pause emulation</button><br>
                <button id="resumeCommand">resume emulation</button><br><br>

                <button id="uriCommand">show uri</button><br><br>

                <button id="showCommand">show</button><br>
                <select id="showCommandArg0">
                    <option value="w">warranty disclaimer</option>
                    <option value="c">full license</option>
                </select><br><br>

                <select id="wrCommandArg0">
                    <option value="admit">admit</option>
                    <option value="dismiss">dismiss</option>
                </select>
                <select id="wrCommandArg1">
                    <option value="all">all players</option>
                    <option value="player">specific player</option>
                </select>
                <input type="number" id="wrCommandArg2" min="1" step="1" placeholder="player id">
                <button id="wrCommand">run</button><br><br>

                <button id="lsCommand">list</button><br>
                <select id="lsCommandArg0">
                    <option value="all">all players</option>
                    <option value="active">active players</option>
                    <option value="waitingroom">players in waiting room</option>
                    <option value="nameless">nameless players</option>
                </select><br><br>

                <select id="keyCommandArg0">
                    <option value="revoke">revoke</option>
                    <option value="enable">enable</option>
                    <option value="disable">disable</option>
                </select>
                <select id="keyCommandArg1">
                    <option value="all">all keys</option>
                    <option value="keyname">specific key</option>
                </select>
                <input type="input" id="keyCommandArg2" placeholder="keyname">
                <button id="keyCommand">run</button><br><br>

                <button id="kcCommand">list keycodes</button><br><br>

                <button id="clearResponsesCommand">clear responses</button><br>
                <button id="clearLogsCommand">clear logs</button><br><br>
            </div>
        </div>

        <div class="item responses">
            <h2 class="contentHeaders">Responses:</h2>
            <ui id="responsesList"></ui><br>
        </div>
        
        <div class="item logs">
            <h2 class="contentHeaders">Logs:</h2>
            <ui id="logList"></ui><br>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
