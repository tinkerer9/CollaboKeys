# Site settings
title:          CollaboKeys
description:    Development blog
url:            https://tinkerer9.github.io
baseurl:        /CollaboKeys

# Author
author:
  name:         Max Parisi
  email:        makermax101@gmail.com
  url:          https://github.com/tinkerer9

# Build settings
markdown:       kramdown

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  # - jemoji #Uncomment this to allow emoji in your post

# Permalinks
permalink:      /:year-:month-:day/:title
paginate:       5

# Related posts settings
related_posts_section:
  max_count:        5
  min_common_tags:  2

# Links to social media
social:
  email: makermax101@gmail.com
  github: https://github.com/tinkerer9
